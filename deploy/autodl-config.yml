# ============================================
# Z-Image 模特换装 - AutoDL 应用配置
# ============================================

# 应用基本信息
app_name: "Z-Image 模特换装"
app_description: "基于阿里通义 Z-Image 模型的 AI 模特换装应用。支持上传模特照片和服装图片，AI 自动生成模特穿着该服装的效果图。本地 GPU 推理，无需排队，隐私安全。"
app_category: "图像生成"
app_tags:
  - "Z-Image"
  - "换装"
  - "模特"
  - "AI生图"
  - "电商"

# GPU 要求
gpu:
  min_memory: "16GB"
  recommended: "24GB"
  gpu_type: "RTX 4090"

# 镜像配置
image:
  # 基础镜像
  base: "nvidia/cuda:12.4-cudnn-runtime-ubuntu22.04"

# 开机启动命令
startup_command: "cd /root && bash ./start.sh"

# 暴露的端口
ports:
  - port: 3000
    name: "前端界面"
    protocol: "http"
  - port: 8001
    name: "后端API"
    protocol: "http"

# 环境变量
env:
  ZIMAGE_MODE: "local"
  ZIMAGE_DEVICE: "cuda"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"

# 模型文件（首次启动自动下载）
models:
  - name: "Z-Image-Turbo"
    source: "modelscope://Tongyi-MAI/Z-Image-Turbo"
    size: "约12GB"
    path: "/root/models/Z-Image-Turbo"

# 使用说明
usage: |
  ## 使用步骤

  1. 点击「部署应用」启动实例
  2. 等待模型下载完成（首次约 5-10 分钟）
  3. 通过「自定义服务」访问前端界面
  4. 创建项目 → 上传模特照片 → 上传服装图片 → 配置参数 → 生成

  ## 功能特点

  - 🎨 **AI 模特换装**：上传模特和服装，AI 自动合成穿着效果
  - ⚡ **本地 GPU 推理**：RTX 4090 约 10 秒出图
  - 🔒 **隐私安全**：图片不离开你的实例
  - 📐 **多种分辨率**：支持 1:1、3:4、4:3 等比例
  - 🎭 **姿势模板**：预设多种模特姿势
  - 📦 **项目管理**：支持多项目、批量生成、导出下载
